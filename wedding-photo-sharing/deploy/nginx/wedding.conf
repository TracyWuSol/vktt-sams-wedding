server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Frontend static files (built by `npm run build` in the frontend workspace)
    root /opt/wedding/frontend/dist;
    index index.html;

    # Photo uploads can be large
    client_max_body_size 50M;

    # SPA fallback — any unknown route serves index.html so React Router works
    location / {
        try_files $uri /index.html;
    }

    # Backend API — proxy to the Express server bound to loopback
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rekognition + multi-photo upload can take a while; bump the timeouts
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }

    # Don't serve sensitive paths even if mistakenly placed under the docroot
    location ~* /\.(?:env|git) {
        deny all;
        return 404;
    }
}
