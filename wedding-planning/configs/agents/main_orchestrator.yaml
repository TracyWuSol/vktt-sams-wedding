# Solace Agent Mesh Orchestrator Agent Configurations

log:
  stdout_log_level: INFO
  log_file_level: INFO
  log_file: orchestrator-agent.log

# Shared SAM config
!include ../shared_config.yaml

apps:
  - name: orchestrator-agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE}
      supports_streaming: true
      agent_name: "OrchestratorAgent"
      display_name: "OrchestratorAgent"
      model: *planning_model
      model_provider:
        - "planning"

      instruction: |
        You are the Wedding Orchestrator Agent. Your primary responsibilities are:
        1. Wedding Planning Workflow — Agent Chain:
          This system includes a two-stage wedding planning workflow. Be aware of the following
          automatic handoff behaviour and do NOT interrupt or duplicate it:
          STAGE 1 — VENUE (WeddingVenueAgent):
          - Handles venue discovery, availability, and quoting.
          - Requires from the user: guest count, location, date, event type.
          - When the user confirms a venue, WeddingVenueAgent automatically triggers CateringAgent,
            passing the confirmed guest count. You do NOT need to initiate this handoff yourself.
  
          STAGE 2 — CATERING (CateringAgent):
          - Automatically activated by WeddingVenueAgent after venue confirmation.
          - Receives guest count silently from the venue handoff — never ask the user for it.
          - Collects: cuisine preferences, dietary restrictions, alcohol requirements, dessert choices.
          - Produces a catering quote and optionally saves a report artifact.
  
          If a user asks about venues → delegate to WeddingVenueAgent.
          If a user asks about catering independently → delegate to CateringAgent, and include
          the guest count in your delegation message if it is known from context.
          If a user asks about both → delegate to WeddingVenueAgent first; it will chain to
          CateringAgent automatically upon venue confirmation.
        2. Monitor events from the Solace mesh. When you receive a wedding alert, immediately use the 'send_line_message' tool.
        3. Handle direct user requests to send LINE messages. 
        4. Tool Usage Rule: When using 'send_line_message', do NOT attempt to provide or check for a 'to_id' parameter. The system is configured to use a default ID automatically. Only provide the 'message' content.
        4. Process tasks received from external sources via the system Gateway.
        5. Analyze each task to determine the optimal execution strategy:
           a. Single Agent Delegation: If the task can be fully addressed by a single peer agent (based on their declared capabilities/description), delegate the task to that agent.
           b. Multi-Agent Coordination: If task completion requires a coordinated effort from multiple peer agents: first, devise a logical execution plan (detailing the sequence of agent invocations and any necessary data handoffs). Then, manage the execution of this plan, invoking each agent in the defined order.
           c. Direct Execution: If the task is not suitable for delegation (neither to a single agent nor a multi-agent sequence) and falls within your own capabilities, execute the task yourself.

        Artifact Management Guidelines:
        - You must review your artifacts and return the ones that are important for the user by using artifact_return embed. You can use list_artifacts to see all available artifacts.
        - Provide regular progress updates using `status_update` embed directives, especially before initiating any tool call.
      inject_system_purpose: true
      inject_response_format: true
      inject_user_profile: true
      session_service:
        type: "sql"
        database_url: "${ORCHESTRATOR_DATABASE_URL, sqlite:///orchestrator.db}"
        default_behavior: "PERSISTENT"
      artifact_service: *default_artifact_service
      artifact_handling_mode: "reference"
      enable_embed_resolution: true
      enable_artifact_content_instruction: true
      data_tools_config: *default_data_tools_config
      tools:
        - group_name: artifact_management
          tool_type: builtin-group
        - tool_type: builtin-group
          group_name: "data_analysis"
        - tool_type: builtin-group
          group_name: "web"
        - tool_type: python
          component_module: "line_tools"
          function_name: "send_line_message"

      agent_card:
        description: "The Orchestrator component. It manages tasks and coordinates multi-agent workflows."
        defaultInputModes: [text]
        defaultOutputModes: [text, file]
        skills:
        - id: strategic_planning
          name: Strategic Planning
          description: Analyzes complex requests and creates structured execution plans, breaking down multi-step goals into logical sequences with clear checkpoints and progress tracking.

        - id: agent_coordination
          name: Agent Coordination
          description: Identifies the most suitable specialized agents for specific tasks and coordinates multi-agent workflows, managing data handoffs and execution sequences to achieve complex objectives efficiently.

        - id: artifact_management
          name: Artifact Management
          description: Creates, transforms, and manages various artifact types including documents, reports, and data files, with capabilities for content generation, formatting, embedding dynamic data, and applying sophisticated data transformations.

        - id: web_search
          name: Web Search
          description: Accesses the web to find information to complete user requests.

        - id: "send_line_message"
          name: "Send LINE Message"
          description: "Send LINE Message automatically from wedding alerts or manually based on user request."

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: ["*"]

        request_timeout_seconds: 600